  <link rel="stylesheet" href="styles.css" />
  <style>
    .gracias-hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--navy) 0%, var(--corp-blue) 100%);
      text-align: center;
      padding: 40px 24px;
    }
    .gracias-box {
      max-width: 560px;
      color: var(--white);
    }
    .gracias-icon {
      width: 80px;
      height: 80px;
      background: rgba(232,130,26,0.15);
      border: 2px solid var(--orange);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }
    .gracias-box h1 {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 800;
      margin-bottom: 16px;
    }
    .gracias-box p {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.8);
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .gracias-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(232,130,26,0.15);
      border: 1px solid rgba(232,130,26,0.4);
      color: #f5a84a;
      border-radius: 100px;
      padding: 8px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      margin: 20px 0 40px;
    }
    .gracias-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-T98FMHL" height="0" width="0" style="display:none;visibility:hidden" title="Google Tag Manager"></iframe>
  </noscript>

  <section class="gracias-hero">
    <div class="gracias-box">
      <div class="gracias-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#E8821A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="36" height="36" aria-hidden="true">
          <path d="M20 6 9 17l-5-5"/>
        </svg>
      </div>
      <h1>¡Tu mensaje llegó!</h1>
      <p>Recibimos tu solicitud y te responderemos en menos de 24 horas hábiles.</p>
      <p>Mientras tanto, revisa algunos de nuestros proyectos y casos de éxito.</p>
      <div class="gracias-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        Respuesta en menos de 24 horas
      </div>
      <div class="gracias-actions">
        <a href="index.html#proyectos" class="btn btn-primary">Ver proyectos</a>
        <a href="index.html" class="btn btn-ghost">Volver al inicio</a>
      </div>
    </div>
  </section>

  <script src="main.js"></script>
</body>
</html>
